name: Go CI (Lint & Build Only)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Sesuaikan versi Go di go.mod kamu
          check-latest: true 

      - name: Get dependencies
        run: go mod download

      - name: Run Linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # argumen opsional jika linter terlalu ketat:
          args: --timeout=5m --issues-exit-code=0

      - name: Build API
        run: go build -o /dev/null ./cmd/api/main.go

      - name: Build Worker
        run: go build -o /dev/null ./cmd/worker/main.go